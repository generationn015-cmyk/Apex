<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX Trading HQ</title>
<style>
:root {
  --bg:#0a0a0f; --s1:#12121a; --s2:#1a1a28; --card:#16162a;
  --bdr:#252540; --bdr2:#35355a;
  --txt:#eeeef6; --t2:#9090b0; --t3:#606080;
  --grn:#00e68a; --red:#ff4466; --blu:#4488ff; --pur:#aa66ff;
  --amb:#ffaa00; --cyn:#00ccdd;
  --grn-bg:#00e68a15; --red-bg:#ff446615; --blu-bg:#4488ff15;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Inter','SF Pro',-apple-system,system-ui,sans-serif;min-height:100vh}
a{color:var(--blu);text-decoration:none}

/* Layout */
.wrap{max-width:1280px;margin:0 auto;padding:16px 20px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--bdr);margin-bottom:20px}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.hdr h1 span{color:var(--grn)}
.hdr-right{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--t2)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);box-shadow:0 0 12px var(--grn);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.mode-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.mode-paper{background:#ffaa0020;color:var(--amb);border:1px solid #ffaa0040}
.mode-live{background:#ff446620;color:var(--red);border:1px solid #ff446640}

/* Stats bar */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;text-align:center}
.stat-val{font-size:22px;font-weight:700;margin-bottom:2px}
.stat-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}

/* Tab nav */
.tabs{display:flex;gap:2px;background:var(--s1);border-radius:10px;padding:3px;margin-bottom:20px;overflow-x:auto}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--txt);background:var(--s2)}
.tab.active{color:var(--txt);background:var(--card);box-shadow:0 2px 8px #0005}
.pane{display:none}.pane.active{display:block}

/* Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;transition:.2s}
.card:hover{border-color:var(--bdr2);transform:translateY(-1px)}
.card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-title{font-size:14px;font-weight:600}
.card-sub{font-size:11px;color:var(--t3);margin-top:2px}
.badge{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600}
.badge-run{background:#00e68a20;color:var(--grn);border:1px solid #00e68a40}
.badge-dead{background:#ff446620;color:var(--red);border:1px solid #ff446640}
.badge-off{background:#25254020;color:var(--t3);border:1px solid var(--bdr)}
.card-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cs{background:var(--s1);padding:8px;border-radius:6px;text-align:center}
.cs-v{font-size:14px;font-weight:600}
.cs-l{font-size:9px;color:var(--t3);text-transform:uppercase;margin-top:1px}

/* Trade table */
.tbl-wrap{overflow-x:auto;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;color:var(--t3);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr)}
td{padding:8px 10px;border-bottom:1px solid var(--bdr)}
tr:hover td{background:var(--s1)}
.g{color:var(--grn)}.r{color:var(--red)}.b{color:var(--blu)}.n{color:var(--t2)}

/* Section */
.sec{font-size:14px;font-weight:600;color:var(--t2);margin:20px 0 10px;display:flex;align-items:center;gap:8px}

/* Footer */
.ftr{text-align:center;padding:20px 0;font-size:11px;color:var(--t3);border-top:1px solid var(--bdr);margin-top:30px}

/* Responsive */
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.wrap{padding:10px 12px}}
</style>
</head>
<body>
<div class="wrap">
  <!-- Header -->
  <div class="hdr">
    <div>
      <h1><span>APEX</span> Trading HQ</h1>
    </div>
    <div class="hdr-right">
      <div class="live-dot" id="liveDot"></div>
      <span id="modeTag" class="mode-badge mode-paper">PAPER</span>
      <span id="lastUpdate">--</span>
    </div>
  </div>

  <!-- Top Stats -->
  <div class="stats" id="topStats"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabNav"></div>

  <!-- Tab Panes -->
  <div id="paneOverview" class="pane active"></div>
  <div id="paneBtc5m" class="pane"></div>
  <div id="paneCrypto" class="pane"></div>
  <div id="paneScanner" class="pane"></div>
  <div id="paneCopy" class="pane"></div>

  <div class="ftr">APEX Trading HQ &mdash; Auto-refresh <span id="countdown">60</span>s &mdash; Data via GitHub</div>
</div>

<script>
const BASE = 'https://raw.githubusercontent.com/generationn015-cmyk/Apex/master';
const REFRESH = 60; // seconds
let timer = REFRESH;

const TABS = [
  {id:'Overview', pane:'paneOverview'},
  {id:'BTC 5-Min', pane:'paneBtc5m'},
  {id:'Crypto Agents', pane:'paneCrypto'},
  {id:'Poly Scanner', pane:'paneScanner'},
  {id:'Copy Trader', pane:'paneCopy'},
];

// Render tabs
const tabNav = document.getElementById('tabNav');
TABS.forEach((t,i) => {
  const el = document.createElement('div');
  el.className = 'tab' + (i===0?' active':'');
  el.textContent = t.id;
  el.onclick = () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(t.pane).classList.add('active');
  };
  tabNav.appendChild(el);
});

// Helpers
const fmt = v => v >= 0 ? `+$${v.toFixed(2)}` : `-$${Math.abs(v).toFixed(2)}`;
const cls = v => v >= 0 ? 'g' : 'r';
const pct = v => `${v.toFixed(1)}%`;
const ago = ts => {
  if(!ts) return '--';
  const d = (Date.now() - new Date(ts).getTime())/1000;
  if(d<60) return `${Math.floor(d)}s ago`;
  if(d<3600) return `${Math.floor(d/60)}m ago`;
  if(d<86400) return `${Math.floor(d/3600)}h ago`;
  return `${Math.floor(d/86400)}d ago`;
};
const shortAddr = a => a && a.length > 10 ? a.slice(0,6)+'...'+a.slice(-4) : (a||'--');

async function fetchJSON(path) {
  try {
    const r = await fetch(`${BASE}/${path}?t=${Date.now()}`);
    if(!r.ok) return null;
    return r.json();
  } catch(e) { return null; }
}

async function fetchJSONL(path) {
  try {
    const r = await fetch(`${BASE}/${path}?t=${Date.now()}`);
    if(!r.ok) return [];
    const txt = await r.text();
    return txt.trim().split('\n').filter(l=>l).map(l=>{try{return JSON.parse(l)}catch{return null}}).filter(Boolean);
  } catch(e) { return []; }
}

async function refresh() {
  const [state, wdog, btc5m, sniper, scan, copyS, trades] = await Promise.all([
    fetchJSON('logs/state.json'),
    fetchJSON('logs/watchdog_status.json'),
    fetchJSON('polymarket/data/btc_5m_state.json'),
    fetchJSON('polymarket/data/sniper_state.json'),
    fetchJSON('polymarket/data/scan_results.json'),
    fetchJSON('polymarket/data/copy_trader_status.json'),
    fetchJSONL('logs/paper_trades.jsonl'),
  ]);

  // Mode & last update
  const mode = state?.mode || 'paper';
  const modeTag = document.getElementById('modeTag');
  modeTag.textContent = mode.toUpperCase();
  modeTag.className = 'mode-badge mode-' + mode;
  document.getElementById('lastUpdate').textContent = ago(wdog?.updated_at || state?.updated_at);

  // BTC 5m stats
  const btcTrades = btc5m?.trades || [];
  const btcResolved = btcTrades.filter(t=>t.resolved);
  const btcWins = btcResolved.filter(t=>t.won).length;
  const btcPnl = btcResolved.reduce((s,t)=>s+(t.pnl||0),0);
  const btcBank = btc5m?.bankroll || 0;
  const btcWR = btcResolved.length ? btcWins/btcResolved.length*100 : 0;

  // Crypto stats
  const cStats = state?.stats || {};
  const cPnl = cStats.total_pnl || 0;

  // Copy stats
  const copyHist = copyS?.history || [];
  const copyResolved = copyHist.filter(h=>h.resolved);
  const copyPnl = copyResolved.reduce((s,h)=>s+(h.pnl||0),0);

  const totalPnl = btcPnl + cPnl + copyPnl;

  // Top stats bar
  document.getElementById('topStats').innerHTML = [
    {v:fmt(totalPnl), l:'Total PnL', c:cls(totalPnl)},
    {v:`$${btcBank.toFixed(2)}`, l:'BTC Bankroll', c:'g'},
    {v:fmt(btcPnl), l:'BTC Sniper PnL', c:cls(btcPnl)},
    {v:`${btcWins}W/${btcResolved.length-btcWins}L`, l:'BTC Record', c:''},
    {v:pct(btcWR), l:'BTC Win Rate', c:btcWR>=50?'g':'r'},
    {v:btc5m?.windows_scanned||0, l:'Windows Scanned', c:''},
    {v:fmt(cPnl), l:'Crypto PnL', c:cls(cPnl)},
    {v:cStats.total_trades||0, l:'Crypto Trades', c:''},
  ].map(s=>`<div class="stat"><div class="stat-val ${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('');

  // ── TAB: Overview ──
  const procs = wdog?.processes || {};
  let ovHTML = '<div class="sec">System Processes</div><div class="grid">';
  const procMeta = {
    apex_bot:['APEX Bot','Lighter.xyz crypto perps'],
    telegram_bot:['Telegram Bot','Command interface'],
    btc_5m_sniper:['BTC 5-Min Sniper','Polymarket BTC Up/Down'],
    polymarket_sniper:['Poly Scanner','Kelly-edge market scanner'],
    copy_trader:['Copy Trader','Whale flow mirroring'],
  };
  for(const [k,[name,desc]] of Object.entries(procMeta)) {
    const p = procs[k] || {};
    const st = p.status || 'offline';
    const bc = st==='running'?'badge-run':st==='dead'?'badge-dead':'badge-off';
    const bl = st==='running'?'RUNNING':st==='dead'?'CRASHED':'OFFLINE';
    ovHTML += `<div class="card"><div class="card-hdr"><div><div class="card-title">${name}</div><div class="card-sub">${desc}</div></div><span class="badge ${bc}">${bl}</span></div>`;
    ovHTML += `<div class="card-stats"><div class="cs"><div class="cs-v">${p.pid||'--'}</div><div class="cs-l">PID</div></div><div class="cs"><div class="cs-v">${p.mode||'--'}</div><div class="cs-l">Mode</div></div></div></div>`;
  }
  ovHTML += '</div>';

  // Last signals
  const sigs = state?.last_signals || {};
  const allSigs = Object.entries(sigs).flatMap(([a,s])=>s.map(x=>({...x,agent:a})));
  if(allSigs.length) {
    ovHTML += '<div class="sec">Active Signals</div><div class="tbl-wrap"><table><tr><th>Agent</th><th>Asset</th><th>Signal</th><th>Strength</th><th>Entry</th></tr>';
    allSigs.forEach(s => {
      const sc = s.signal==='BUY'?'g':'r';
      ovHTML += `<tr><td>${s.agent}</td><td>${s.asset}</td><td class="${sc}">${s.signal}</td><td>${(s.strength||0).toFixed(2)}</td><td>$${(s.entry_price||0).toFixed(2)}</td></tr>`;
    });
    ovHTML += '</table></div>';
  }
  document.getElementById('paneOverview').innerHTML = ovHTML;

  // ── TAB: BTC 5-Min ──
  let btcHTML = '';
  if(!btcTrades.length) {
    btcHTML = '<div class="card" style="text-align:center;padding:40px;color:var(--t3)">No BTC 5-min data yet. Waiting for first trade...</div>';
  } else {
    // PnL curve (simple text-based for now, then table)
    btcHTML += '<div class="sec">Trade History</div><div class="tbl-wrap"><table><tr><th>Time</th><th>Direction</th><th>Bet</th><th>Edge</th><th>BTC Price</th><th>Confidence</th><th>Score</th><th>Result</th><th>PnL</th></tr>';
    [...btcTrades].reverse().forEach(t => {
      const res = t.resolved ? (t.won?'<span class="g">WIN</span>':'<span class="r">LOSS</span>') : '<span class="n">PENDING</span>';
      const pnl = t.resolved ? `<span class="${cls(t.pnl)}">${fmt(t.pnl)}</span>` : '--';
      const dir = t.direction==='UP'?'<span class="g">UP</span>':'<span class="r">DOWN</span>';
      const conf = t.confidence != null ? pct(t.confidence*100) : '--';
      const score = t.score != null ? (t.score>0?'+':'')+t.score.toFixed(1) : '--';
      btcHTML += `<tr><td>${(t.timestamp||'').slice(11,19)} UTC</td><td>${dir}</td><td>$${(t.bet_size||0).toFixed(2)}</td><td>${pct((t.edge||0)*100)}</td><td>$${(t.btc_price||0).toLocaleString()}</td><td>${conf}</td><td>${score}</td><td>${res}</td><td>${pnl}</td></tr>`;
    });
    btcHTML += '</table></div>';

    // Indicator breakdown for latest trade with indicators
    const withInd = btcTrades.filter(t=>t.indicators?.scores);
    if(withInd.length) {
      const last = withInd[withInd.length-1];
      const scores = last.indicators.scores;
      btcHTML += '<div class="sec">Latest Signal Breakdown</div><div class="grid">';
      const indNames = {window_delta:'Window Delta',macd_histogram:'MACD Hist',macd_acceleration:'MACD Accel',macd_cross:'MACD Cross',macd_zero_regime:'MACD Zero',fast_macd_confirm:'Fast MACD',macd_volume_flow:'Vol Flow',tick_trend:'Tick Trend',micro_momentum:'Micro Mom',acceleration:'Accel',ema_cross:'EMA Cross',rsi:'RSI',volume_surge:'Vol Surge',macd:'MACD'};
      for(const [k,v] of Object.entries(scores)) {
        const name = indNames[k] || k;
        const c = v>0?'g':v<0?'r':'n';
        btcHTML += `<div class="card" style="text-align:center;padding:12px"><div class="card-sub">${name}</div><div class="stat-val ${c}" style="font-size:18px">${v>0?'+':''}${v.toFixed(1)}</div></div>`;
      }
      btcHTML += '</div>';
    }
  }
  document.getElementById('paneBtc5m').innerHTML = btcHTML;

  // ── TAB: Crypto Agents ──
  const agentMeta = {ATLAS:{c:'var(--blu)',d:'SMA+ADX'},ORACLE:{c:'var(--grn)',d:'MACD+RSI'},SNIPER:{c:'var(--amb)',d:'Regime Switch'},SENTINEL:{c:'var(--pur)',d:'EMA+Squeeze'}};
  let cryptoHTML = '<div class="grid">';
  for(const [name,meta] of Object.entries(agentMeta)) {
    const agSigs = sigs[name] || [];
    const hasSig = agSigs.length > 0;
    const badge = hasSig ? '<span class="badge badge-run">SIGNAL</span>' : '<span class="badge badge-off">WATCHING</span>';

    // Per-agent stats from trades
    const agTrades = trades.filter(t=>t.agent===name);
    const agClosed = agTrades.filter(t=>t.status==='WIN'||t.status==='LOSS');
    const agWins = agClosed.filter(t=>t.status==='WIN').length;
    const agPnl = agClosed.reduce((s,t)=>s+(t.pnl||0),0);
    const agWR = agClosed.length ? agWins/agClosed.length*100 : 0;
    const agOpen = agTrades.filter(t=>t.status==='OPEN').length;

    cryptoHTML += `<div class="card" style="border-top:3px solid ${meta.c}"><div class="card-hdr"><div><div class="card-title">${name}</div><div class="card-sub">${meta.d}</div></div>${badge}</div>`;
    cryptoHTML += `<div class="card-stats"><div class="cs"><div class="cs-v ${cls(agPnl)}">${fmt(agPnl)}</div><div class="cs-l">PnL</div></div><div class="cs"><div class="cs-v">${pct(agWR)}</div><div class="cs-l">Win Rate</div></div><div class="cs"><div class="cs-v">${agTrades.length}</div><div class="cs-l">Trades</div></div><div class="cs"><div class="cs-v">${agOpen}</div><div class="cs-l">Open</div></div></div>`;
    if(agSigs.length) {
      agSigs.slice(0,2).forEach(s => {
        const sc = s.signal==='BUY'?'g':'r';
        cryptoHTML += `<div style="margin-top:8px;font-size:11px;color:var(--t2)">${s.asset} <span class="${sc}">${s.signal}</span> @ $${(s.entry_price||0).toFixed(2)} str=${(s.strength||0).toFixed(2)}</div>`;
      });
    }
    cryptoHTML += '</div>';
  }
  cryptoHTML += '</div>';

  // Open positions
  const openTrades = trades.filter(t=>t.status==='OPEN');
  if(openTrades.length) {
    cryptoHTML += '<div class="sec">Open Positions</div><div class="tbl-wrap"><table><tr><th>Agent</th><th>Asset</th><th>Dir</th><th>Entry</th><th>SL</th><th>TP</th></tr>';
    openTrades.forEach(t => {
      cryptoHTML += `<tr><td>${t.agent}</td><td>${t.asset}</td><td class="${t.direction==='BUY'?'g':'r'}">${t.direction}</td><td>$${(t.entry_price||0).toFixed(2)}</td><td>$${(t.stop_loss||0).toFixed(2)}</td><td>$${(t.take_profit||0).toFixed(2)}</td></tr>`;
    });
    cryptoHTML += '</table></div>';
  }
  document.getElementById('paneCrypto').innerHTML = cryptoHTML;

  // ── TAB: Poly Scanner ──
  const sniperPositions = sniper?.positions || {};
  const sniperHistory = sniper?.history || [];
  let scanHTML = '';

  if(Object.keys(sniperPositions).length) {
    scanHTML += '<div class="sec">Open Positions</div><div class="tbl-wrap"><table><tr><th>Market</th><th>Side</th><th>Bet</th><th>Edge</th></tr>';
    for(const [cid,p] of Object.entries(sniperPositions)) {
      scanHTML += `<tr><td>${(p.question||'').slice(0,60)}</td><td>${p.direction}</td><td>$${(p.bet_size||0).toFixed(2)}</td><td>${pct((p.edge||0)*100)}</td></tr>`;
    }
    scanHTML += '</table></div>';
  }

  if(scan && Array.isArray(scan) && scan.length) {
    scanHTML += '<div class="sec">Latest Scan Results</div><div class="tbl-wrap"><table><tr><th>Market</th><th>Edge</th><th>Confidence</th><th>Price</th></tr>';
    scan.slice(0,30).forEach(r => {
      const edge = r.edge||r.kelly_edge||0;
      scanHTML += `<tr><td>${(r.question||r.market||'').slice(0,60)}</td><td class="g">${pct(edge*100)}</td><td>${pct((r.confidence||r.true_prob||0)*100)}</td><td>${(r.price||r.market_price||0).toFixed(3)}</td></tr>`;
    });
    scanHTML += '</table></div>';
  }

  if(!scanHTML) scanHTML = '<div class="card" style="text-align:center;padding:40px;color:var(--t3)">No scanner data yet.</div>';
  document.getElementById('paneScanner').innerHTML = scanHTML;

  // ── TAB: Copy Trader ──
  let copyHTML = '';
  if(!copyS) {
    copyHTML = '<div class="card" style="text-align:center;padding:40px;color:var(--t3)">Copy Trader not started yet.</div>';
  } else {
    const cBank = copyS.bankroll || 0;
    const cPos = Object.keys(copyS.positions||{}).length;
    const cWallets = copyS.total_wallets_tracked || 0;
    const cResolved = copyResolved;
    const cWins = cResolved.filter(h=>h.won).length;
    const cWR = cResolved.length ? cWins/cResolved.length*100 : 0;

    copyHTML += `<div class="stats"><div class="stat"><div class="stat-val">$${cBank.toFixed(2)}</div><div class="stat-lbl">Bankroll</div></div><div class="stat"><div class="stat-val ${cls(copyPnl)}">${fmt(copyPnl)}</div><div class="stat-lbl">PnL</div></div><div class="stat"><div class="stat-val">${pct(cWR)}</div><div class="stat-lbl">Win Rate</div></div><div class="stat"><div class="stat-val">${cPos}</div><div class="stat-lbl">Open</div></div><div class="stat"><div class="stat-val">${cWallets}</div><div class="stat-lbl">Wallets</div></div></div>`;

    // Top traders
    const topT = copyS.top_traders || [];
    if(topT.length) {
      copyHTML += '<div class="sec">Top Whale Leaderboard</div><div class="tbl-wrap"><table><tr><th>#</th><th>Wallet</th><th>Win Rate</th><th>Trades</th><th>PnL</th><th>Volume</th></tr>';
      topT.slice(0,10).forEach((t,i) => {
        copyHTML += `<tr><td>${i+1}</td><td>${shortAddr(t.address)}</td><td class="${t.win_rate>=50?'g':'r'}">${pct(t.win_rate)}</td><td>${t.resolved}</td><td class="${cls(t.net_pnl)}">${fmt(t.net_pnl)}</td><td>$${(t.volume||0).toLocaleString()}</td></tr>`;
      });
      copyHTML += '</table></div>';
    }

    // History
    if(cResolved.length) {
      copyHTML += '<div class="sec">Recent Copy Trades</div><div class="tbl-wrap"><table><tr><th>Direction</th><th>Bet</th><th>Whale</th><th>Result</th><th>PnL</th></tr>';
      [...cResolved].reverse().slice(0,20).forEach(h => {
        const res = h.won?'<span class="g">WIN</span>':'<span class="r">LOSS</span>';
        copyHTML += `<tr><td>${h.direction}</td><td>$${(h.bet_size||0).toFixed(2)}</td><td>${shortAddr(h.whale_address)}</td><td>${res}</td><td class="${cls(h.pnl)}">${fmt(h.pnl)}</td></tr>`;
      });
      copyHTML += '</table></div>';
    }
  }
  document.getElementById('paneCopy').innerHTML = copyHTML;
}

// Countdown + refresh
setInterval(() => {
  timer--;
  document.getElementById('countdown').textContent = timer;
  if(timer <= 0) { timer = REFRESH; refresh(); }
}, 1000);

refresh();
</script>
</body>
</html>
